<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ETH 清算气泡图</title>
<style>
:root{--bg:#f5f7fb;--text:#1f2937;--muted:#64748b;--nav-bg:#0b1220;--nav-border:#243145;--nav-text:#eef3f9;--link:#d6deea;--panel-bg:#fff;--panel-border:#dce3ec;--ctl-bg:#fff;--ctl-text:#111827;--ctl-border:#cbd5e1;--chart-border:#e5e7eb;--canvas-bg:#fff}
[data-theme="dark"]{--bg:#000;--text:#f8fafc;--muted:#cbd5e1;--nav-bg:#000;--nav-border:#1f2937;--nav-text:#f8fafc;--link:#e2e8f0;--panel-bg:#000;--panel-border:#263041;--ctl-bg:#000;--ctl-text:#f8fafc;--ctl-border:#475569;--chart-border:#263041;--canvas-bg:#000}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}
.nav{height:56px;background:var(--nav-bg);border-bottom:1px solid var(--nav-border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:10}
.nav-left,.nav-right{display:flex;align-items:center;gap:14px}
.brand{font-size:18px;font-weight:700;color:var(--nav-text)}
.menu a{color:var(--link);text-decoration:none;font-size:16px;margin-right:18px}
.menu a.active{color:#fff;font-weight:700}
.upgrade{color:#fff;font-weight:700;text-decoration:none}
.wrap{width:100%;max-width:none;margin:0 auto;padding:14px;box-sizing:border-box}
.panel{border:1px solid var(--panel-border);background:var(--panel-bg);margin:10px 0;padding:12px;border-radius:10px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.small{font-size:12px;color:var(--muted)}
select,button,input{height:34px;border:1px solid var(--ctl-border);border-radius:8px;background:var(--ctl-bg);color:var(--ctl-text);padding:0 10px}
input{width:96px}
button{cursor:pointer}
.btn-applied{background:#0f172a;color:#eef3f9;border-color:#0f172a}
.chart{width:100%;height:682px;border:1px solid var(--chart-border);border-radius:8px;background:var(--panel-bg);display:block}
.chart-wrap{position:relative}
.legend{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px}
.tag{display:inline-flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:999px;display:inline-block}
.bubble-tip{position:absolute;display:none;min-width:180px;max-width:260px;background:rgba(2,6,23,.98);color:#f8fafc;border:1px solid rgba(148,163,184,.35);border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.5;box-shadow:0 10px 28px rgba(2,6,23,.35);pointer-events:none}
.theme-toggle{display:inline-flex;align-items:center;gap:6px;font-size:13px}
.theme-toggle button{height:30px;padding:0 10px;border-radius:999px;border:1px solid rgba(148,163,184,0.45);background:transparent;color:var(--nav-text);cursor:pointer}
.theme-toggle button.label{cursor:default;opacity:.92}
.theme-toggle button.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.18);color:#fff}
.upgrade-modal{position:fixed;inset:0;background:rgba(2,6,23,.55);display:none;align-items:center;justify-content:center;z-index:9999}
.upgrade-modal.show{display:flex}
.upgrade-card{width:min(880px,92vw);max-height:82vh;background:#0b1220;color:#e2e8f0;border:1px solid #334155;border-radius:10px;box-shadow:0 10px 30px rgba(2,6,23,.45);overflow:hidden}
.upgrade-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #334155}
.upgrade-title{font-size:14px;font-weight:700}
.upgrade-close{background:transparent;border:1px solid #475569;color:#e2e8f0;border-radius:6px;padding:4px 8px;cursor:pointer}
.upgrade-log{margin:0;padding:12px;white-space:pre-wrap;overflow:auto;max-height:62vh;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.45}
.upgrade-foot{padding:8px 12px;border-top:1px solid #334155;font-size:12px;color:#94a3b8}
.footer{margin:18px auto 0 auto;max-width:1200px;padding:10px 12px;font-size:12px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-left">
    <div class="brand">ETH Liquidation Map</div>
    <div class="menu">
      <a href="/">清算热区</a>
      <a href="/config">模型配置</a>
      <a href="/monitor">雷区监控</a>
      <a href="/map">盘口汇总</a>
      <a href="/liquidations">强平清算</a>
      <a href="/bubbles" class="active">气泡图</a>
      <a href="/webdatasource">页面数据源</a>
      <a href="/channel">消息通道</a>
      <a href="/analysis">日内分析</a>
    </div>
  </div>
  <div class="nav-right">
    <div class="theme-toggle">
      <button class="label" type="button">主题</button>
      <button id="themeDark" onclick="setTheme('dark')">深色</button>
      <button id="themeLight" onclick="setTheme('light')">浅色</button>
    </div>
    <a href="#" class="upgrade" onclick="return doUpgrade(event)">升级</a>
  </div>
</div>

<div class="wrap">
  <div class="panel">
    <div class="row">
      <span>周期</span>
      <select id="iv">
        <option value="1m">1M</option>
        <option value="2m">2M</option>
        <option value="5m" selected>5M</option>
        <option value="10m">10M</option>
        <option value="15m">15M</option>
        <option value="30m">30M</option>
        <option value="1h">1H</option>
        <option value="4h">4H</option>
        <option value="8h">8H</option>
        <option value="12h">12H</option>
        <option value="1d">1D</option>
        <option value="3d">3D</option>
        <option value="7d">7D</option>
      </select>
      <button onclick="load()">刷新</button>
      <span class="small">过滤小单 ETH 数量</span>
      <input id="qtyFilter" type="number" min="0" step="0.1" value="25">
      <button id="filterBtn" onclick="applyQtyFilter()">应用过滤</button>
      <label class="small" style="display:inline-flex;align-items:center;gap:6px;margin-left:6px">
        <input id="hist" type="checkbox">历史
      </label>
      <button id="moreBtn" style="display:none" onclick="loadMoreHistory()">向左加载</button>
      <span id="meta" class="small"></span>
    </div>
    <div class="chart-wrap">
      <canvas id="cv" class="chart" width="1600" height="620"></canvas>
      <div id="bubbleTip" class="bubble-tip"></div>
    </div>
    <div class="legend small">
      <div>气泡大小代表清算金额，颜色代表多空方向。滚轮缩放，按住鼠标左键左右拖动；勾选“历史”后可继续向左加载。</div>
      <div class="tag">
        <span class="dot" style="background:#dc2626"></span><span>红色=多单爆仓</span>
        <span class="dot" style="margin-left:10px;background:#16a34a"></span><span>绿色=空单爆仓</span>
      </div>
    </div>
  </div>
</div>

<script>
let candles=[],events=[],viewStart=0,viewCount=120,drag=false,lastX=0,intervalMs=0,latestStart=0,qtyFilter=25,filterApplied=true,bubbleHoverMeta=[],klineSource='-';
function setTheme(t){const theme=(t==='dark')?'dark':'light';document.documentElement.setAttribute('data-theme',theme);try{localStorage.setItem('theme',theme);}catch(_){}const bd=document.getElementById('themeDark'),bl=document.getElementById('themeLight');if(bd)bd.classList.toggle('active',theme==='dark');if(bl)bl.classList.toggle('active',theme==='light');}
function initTheme(){let t='light';try{t=localStorage.getItem('theme')||'light';}catch(_){}setTheme(t);}
function intervalToMs(iv){switch(String(iv||'')){case '1m':return 60e3;case '2m':return 120e3;case '5m':return 300e3;case '10m':return 600e3;case '15m':return 900e3;case '30m':return 1800e3;case '1h':return 3600e3;case '4h':return 14400e3;case '8h':return 28800e3;case '12h':return 43200e3;case '1d':return 86400e3;case '3d':return 3*86400e3;case '7d':return 7*86400e3;default:return 0;}}
function fit(){const c=document.getElementById('cv');const r=c.getBoundingClientRect(),dpr=window.devicePixelRatio||1;const w=Math.max(700,Math.floor(r.width)),h=Math.max(420,Math.floor(r.height));c.width=Math.floor(w*dpr);c.height=Math.floor(h*dpr);const x=c.getContext('2d');x.setTransform(dpr,0,0,dpr,0,0);return {c,x,w,h};}
function toNum(v){const n=Number(v);return isFinite(n)?n:0;}
function mapInterval(v){if(v==='10m')return '5m';if(v==='7d')return '1w';return v;}
function visibleEvents(){return (events||[]).filter(ev=>toNum(ev.qty)>=qtyFilter);}
function syncFilterBtn(){const btn=document.getElementById('filterBtn');if(btn)btn.classList.toggle('btn-applied',!!filterApplied);}
function applyQtyFilter(){const input=document.getElementById('qtyFilter');qtyFilter=Math.max(0,toNum(input&&input.value));if(input)input.value=String(qtyFilter);filterApplied=true;syncFilterBtn();draw();updateMeta();}
function updateMeta(){const meta=document.getElementById('meta');if(!meta)return;meta.textContent='K线来源 '+(klineSource||((document.getElementById('iv')&&document.getElementById('iv').value)||'-'))+' | 区间清算事件 '+visibleEvents().length+' 条 | 已过滤小于 '+qtyFilter+' ETH';}
function drawMessage(msg){const v=fit(),x=v.x,W=v.w,H=v.h;x.clearRect(0,0,W,H);x.fillStyle=cssVar('--canvas-bg','#fff');x.fillRect(0,0,W,H);x.fillStyle=cssVar('--muted','#64748b');x.font='14px sans-serif';x.fillText(msg,16,26);}
function fmtAmt(n){n=toNum(n);if(!isFinite(n))return '-';return n.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtQty(n){return toNum(n).toLocaleString('zh-CN',{maximumFractionDigits:4});}
function fmtPrice(n){return toNum(n).toLocaleString('zh-CN',{minimumFractionDigits:1,maximumFractionDigits:1});}
function fmtTime(ts){try{return new Date(toNum(ts)).toLocaleString('zh-CN',{hour12:false});}catch(_){return '-';}}
function hideBubbleTip(){const tip=document.getElementById('bubbleTip');if(tip)tip.style.display='none';}
function showBubbleTip(hit,ev){
  const tip=document.getElementById('bubbleTip');
  const wrap=document.querySelector('.chart-wrap');
  if(!tip||!wrap||!hit)return;
  tip.innerHTML='<div><strong>'+(String(hit.side)==='long'?'多单爆仓':'空单爆仓')+'</strong></div>'+
    '<div>交易所: '+String(hit.exchange||'-').toUpperCase()+'</div>'+
    '<div>价格: '+fmtPrice(hit.price)+'</div>'+
    '<div>时间: '+fmtTime(hit.event_ts)+'</div>'+
    '<div>数量: '+fmtQty(hit.qty)+' ETH</div>'+
    '<div>金额: '+fmtAmt(hit.notional_usd)+' USD</div>';
  tip.style.display='block';
  const wr=wrap.getBoundingClientRect();
  let left=(ev.clientX-wr.left)+14,top=(ev.clientY-wr.top)+14;
  tip.style.left='0px';tip.style.top='0px';
  const tw=tip.offsetWidth||220,th=tip.offsetHeight||110;
  if(left+tw>wr.width-10)left=Math.max(8,wr.width-10-tw);
  if(top+th>wr.height-10)top=Math.max(8,wr.height-10-th);
  tip.style.left=left+'px';tip.style.top=top+'px';
}
function parseRows(rows,interval){let cs=(rows||[]).map(r=>({t:toNum(r[0]),o:toNum(r[1]),h:toNum(r[2]),l:toNum(r[3]),c:toNum(r[4])}));if(interval==='2m'){const out=[];for(let i=0;i+1<cs.length;i+=2){const a=cs[i],b=cs[i+1];out.push({t:a.t,o:a.o,h:Math.max(a.h,b.h),l:Math.min(a.l,b.l),c:b.c});}cs=out;}if(interval==='10m'){const out=[];for(let i=0;i+1<cs.length;i+=2){const a=cs[i],b=cs[i+1];out.push({t:a.t,o:a.o,h:Math.max(a.h,b.h),l:Math.min(a.l,b.l),c:b.c});}cs=out;}if(interval==='7d'){const out=[];for(let i=0;i+6<cs.length;i+=7){const a=cs[i],g=cs.slice(i,i+7),z=g[g.length-1];out.push({t:a.t,o:a.o,h:Math.max(...g.map(v=>v.h)),l:Math.min(...g.map(v=>v.l)),c:z.c});}cs=out;}return cs;}
function cssVar(name,fallback){try{const v=getComputedStyle(document.documentElement).getPropertyValue(name).trim();return v||fallback;}catch(_){return fallback;}}
function draw(){const v=fit(),x=v.x,W=v.w,H=v.h,padL=70,padR=20,padT=18,padB=42,pw=W-padL-padR,ph=H-padT-padB,by=padT+ph;x.clearRect(0,0,W,H);bubbleHoverMeta=[];hideBubbleTip();const bg=cssVar('--canvas-bg','#fff');const muted=cssVar('--muted','#64748b');const grid=cssVar('--chart-border','#e5e7eb');x.fillStyle=bg;x.fillRect(0,0,W,H);if(!candles.length){x.fillStyle=muted;x.fillText('暂无数据',16,24);return;}const s=Math.max(0,Math.min(candles.length-1,viewStart)),e=Math.max(s+10,Math.min(candles.length,s+viewCount));const cs=candles.slice(s,e);const minP=Math.min(...cs.map(v=>v.l)),maxP=Math.max(...cs.map(v=>v.h));const span=Math.max(1e-6,maxP-minP);const sx=i=>padL+(i/Math.max(1,cs.length-1))*pw,sy=p=>padT+((maxP-p)/span)*ph;x.strokeStyle=grid;x.font='12px sans-serif';for(let i=0;i<=4;i++){const y=padT+ph*i/4,val=maxP-(span*i/4);x.beginPath();x.moveTo(padL,y);x.lineTo(W-padR,y);x.stroke();x.fillStyle=muted;x.fillText(val.toFixed(1),6,y+4);}const bodyW=Math.max(3,Math.min(12,pw/Math.max(20,cs.length)));for(let i=0;i<cs.length;i++){const c=cs[i],px=sx(i),yo=sy(c.o),yc=sy(c.c),yh=sy(c.h),yl=sy(c.l),up=c.c>=c.o;x.strokeStyle=up?'#22c55e':'#f87171';x.beginPath();x.moveTo(px,yh);x.lineTo(px,yl);x.stroke();x.fillStyle=up?'rgba(34,197,94,0.82)':'rgba(248,113,113,0.82)';x.fillRect(px-bodyW/2,Math.min(yo,yc),bodyW,Math.max(1,Math.abs(yc-yo)));}
function upperBound(arr,v){let lo=0,hi=arr.length;while(lo<hi){const mid=(lo+hi)>>1;if(arr[mid]<=v)lo=mid+1;else hi=mid;}return lo;}
const t0=cs[0].t,t1=cs[cs.length-1].t;
const spanMs=(intervalMs>0?intervalMs:intervalToMs(document.getElementById('iv').value||''))||0;
const tEnd=t1+(spanMs>0?spanMs:0);
const times=cs.map(v=>v.t);
const vis=visibleEvents().filter(e=>{const tt=toNum(e.event_ts);return tt>=t0&&(tEnd>t0?tt<tEnd:tt<=t1);});
const maxN=Math.max(1,...vis.map(e=>toNum(e.notional_usd)));
const highlightStart=times[times.length-1]||t1;
const highlightEnd=highlightStart+(spanMs>0?spanMs:0);
for(const ev of vis){
  const tt=toNum(ev.event_ts);
  if(spanMs>0&&tt>=highlightEnd)continue;
  const idx=Math.max(0,Math.min(times.length-1,upperBound(times,tt)-1));
  let px=sx(idx);
  if(spanMs>0&&idx<times.length-1){
    const step=sx(idx+1)-sx(idx);
    const frac=Math.max(0,Math.min(1,(tt-times[idx])/spanMs));
    px+=step*frac;
  }
  const py=sy(toNum(ev.price));
  const r=3+18*Math.sqrt(Math.max(0,toNum(ev.notional_usd))/maxN);
  const side=String(ev.side||'').toLowerCase();
  const isLatest=(spanMs>0)?(tt>=highlightStart&&tt<highlightEnd):(idx===times.length-1);
  const color=(side==='long')?'rgba(220,38,38,'+(isLatest?'0.45':'0.28')+')':'rgba(22,163,74,'+(isLatest?'0.45':'0.28')+')';
  const stroke=(side==='long')?'rgba(220,38,38,'+(isLatest?'0.95':'0.55')+')':'rgba(22,163,74,'+(isLatest?'0.95':'0.55')+')';
  x.beginPath();x.fillStyle=color;x.strokeStyle=stroke;x.arc(px,py,r,0,Math.PI*2);x.fill();x.stroke();
  bubbleHoverMeta.push({px:px,py:py,r:r,event:ev});
}
x.fillStyle=muted;for(let i=0;i<=6;i++){const k=Math.floor((cs.length-1)*i/6),px=sx(k),t=new Date(cs[k].t).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});x.fillText(t,Math.max(padL,px-30),H-10);}}
function uniqByT(list){const out=[];const seen=new Set();for(const it of (list||[])){const t=toNum(it.t);if(!t||seen.has(t))continue;seen.add(t);out.push(it);}out.sort((a,b)=>a.t-b.t);return out;}
function mergeEvents(a,b){const out=[];const key=e=>String(toNum(e.event_ts))+'|'+String(e.exchange||'')+'|'+String(e.side||'')+'|'+String(toNum(e.price))+'|'+String(toNum(e.qty));const seen=new Set();for(const it of (a||[])){const k=key(it);if(seen.has(k))continue;seen.add(k);out.push(it);}for(const it of (b||[])){const k=key(it);if(seen.has(k))continue;seen.add(k);out.push(it);}out.sort((x,y)=>toNum(x.event_ts)-toNum(y.event_ts));return out;}
function setMoreBtnVisible(){const cb=document.getElementById('hist');const b=document.getElementById('moreBtn');if(!cb||!b)return;b.style.display=cb.checked?'inline-block':'none';}
async function load(){const iv=document.getElementById('iv').value;const kr=await fetch('/api/klines?interval='+encodeURIComponent(iv)+'&limit=500');if(!kr.ok){const msg='K线加载失败: '+await kr.text();candles=[];events=[];klineSource='-';updateMeta();drawMessage(msg);return;}const kd=await kr.json();klineSource=kd.source||iv;candles=uniqByT(parseRows(kd.rows||[],iv));if(!candles.length){events=[];updateMeta();drawMessage('K线加载成功，但返回为空');return;}intervalMs=(candles.length>=2)?Math.max(0,toNum(candles[candles.length-1].t)-toNum(candles[candles.length-2].t)):intervalToMs(iv);if(!(intervalMs>0))intervalMs=intervalToMs(iv);latestStart=candles.length?toNum(candles[candles.length-1].t):0;events=[];if(candles.length){const startTS=toNum(candles[0].t);const endTS=latestStart+(intervalMs>0?intervalMs:0);const er=await fetch('/api/liquidations?limit=5000&page=1&start_ts='+encodeURIComponent(startTS)+'&end_ts='+encodeURIComponent(endTS));const ed=await er.json();events=ed.rows||[];}viewCount=Math.min(160,Math.max(50,Math.floor(candles.length*0.45)));viewStart=Math.max(0,candles.length-viewCount);setMoreBtnVisible();updateMeta();draw();}
async function loadMoreHistory(){const cb=document.getElementById('hist');if(!cb||!cb.checked)return;if(!candles.length)return;const iv=document.getElementById('iv').value;const endTS=Math.max(0,toNum(candles[0].t)-1);const kr=await fetch('/api/klines?interval='+encodeURIComponent(iv)+'&limit=500&end_ts='+encodeURIComponent(endTS));if(!kr.ok){document.getElementById('meta').textContent='历史 K 线加载失败: '+await kr.text();return;}const kd=await kr.json();klineSource=kd.source||klineSource;const more=uniqByT(parseRows(kd.rows||[],iv));if(!more.length){document.getElementById('meta').textContent='没有更多历史 K 线';return;}const added=more.filter(x=>toNum(x.t)<toNum(candles[0].t));if(!added.length){document.getElementById('meta').textContent='没有更多历史 K 线';return;}candles=uniqByT(added.concat(candles));const spanMs=(intervalMs>0?intervalMs:intervalToMs(iv));const startTS=toNum(added[0].t),endTS2=toNum(added[added.length-1].t)+(spanMs>0?spanMs:0);const er=await fetch('/api/liquidations?limit=5000&page=1&start_ts='+encodeURIComponent(startTS)+'&end_ts='+encodeURIComponent(endTS2));const ed=await er.json();events=mergeEvents(ed.rows||[],events);viewStart=Math.max(0,viewStart+added.length);updateMeta();draw();}
const c=document.getElementById('cv');
c.addEventListener('wheel',e=>{if(!candles.length)return;e.preventDefault();const right=Math.min(candles.length,viewStart+viewCount);const factor=e.deltaY<0?0.88:1.12;const nextCount=Math.max(30,Math.min(candles.length,Math.round(viewCount*factor)));viewCount=nextCount;viewStart=Math.max(0,Math.min(candles.length-viewCount,right-viewCount));draw();},{passive:false});
c.addEventListener('mousedown',e=>{drag=true;lastX=e.clientX;});
c.addEventListener('mousemove',e=>{const rect=c.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;let hit=null,dist=1e18;for(const it of bubbleHoverMeta){const d=Math.hypot(mx-it.px,my-it.py);if(d<=it.r+3&&d<dist){dist=d;hit=it.event;}}if(hit)showBubbleTip(hit,e);else hideBubbleTip();});
c.addEventListener('mouseleave',()=>hideBubbleTip());
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{if(!drag||!candles.length)return;const dx=e.clientX-lastX;lastX=e.clientX;const shift=Math.round(-dx/8);if(shift!==0){viewStart=Math.max(0,Math.min(candles.length-viewCount,viewStart+shift));draw();}});
window.addEventListener('resize',()=>draw());
document.getElementById('iv').addEventListener('change',load);
document.getElementById('hist').addEventListener('change',setMoreBtnVisible);
document.getElementById('qtyFilter').addEventListener('input',()=>{filterApplied=false;syncFilterBtn();});
document.getElementById('qtyFilter').addEventListener('change',applyQtyFilter);
async function openUpgradeModal(){const m=document.getElementById('upgradeModal'),logEl=document.getElementById('upgradeLog'),foot=document.getElementById('upgradeFoot');if(!m||!logEl||!foot)return;m.classList.add('show');logEl.textContent='';foot.textContent='正在触发升级...';const r=await fetch('/api/upgrade/pull',{method:'POST'});const d=await r.json().catch(()=>({error:'response parse failed',output:''}));if(d.error){logEl.textContent=String(d.output||'');foot.textContent='触发失败: '+d.error;return;}foot.textContent='已触发，正在执行...';let stable=0;for(let i=0;i<180;i++){await new Promise(res=>setTimeout(res,1000));const pr=await fetch('/api/upgrade/progress').then(x=>x.json()).catch(()=>null);if(!pr)continue;logEl.textContent=String(pr.log||'');logEl.scrollTop=logEl.scrollHeight;if(pr.done){foot.textContent=(String(pr.exit_code||'')==='0')?'升级完成并已重启':'升级完成，退出码 '+String(pr.exit_code||'?');return;}if(!pr.running)stable++;else stable=0;if(stable>=3){foot.textContent='升级进程已结束，但状态未知，请检查日志';return;}}foot.textContent='升级仍在进行，请稍后再看';}
function closeUpgradeModal(){const m=document.getElementById('upgradeModal');if(m)m.classList.remove('show');}
async function doUpgrade(event){if(event)event.preventDefault();openUpgradeModal();return false;}
initTheme();
syncFilterBtn();
load();

  </div>
</div>

(async()=>{try{const r=await fetch('/api/version');const v=await r.json();const el=document.getElementById('globalFooter');if(el)el.textContent='Code by Yuhao@jiansutech.com - '+(v.commit_time||'-')+' - '+(v.commit_id||'-')+' - '+(v.branch||'-');}catch(_){const el=document.getElementById('globalFooter');if(el)el.textContent='Code by Yuhao@jiansutech.com - - - -';}})();
</script>
