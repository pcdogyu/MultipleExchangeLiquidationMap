<style id="shared-top-nav-style">
#shared-top-nav.nav{height:58px;background:var(--nav,#101827);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200}
#shared-top-nav .nav-left,#shared-top-nav .nav-right{display:flex;align-items:center;gap:20px}
#shared-top-nav .nav-left{min-width:0;flex:1}
#shared-top-nav .nav-right{flex:0 0 auto}
#shared-top-nav .brand{font-size:18px;font-weight:700;color:var(--navInk,#f6f7fb);white-space:nowrap}
#shared-top-nav .menu{min-width:0;flex:1;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
#shared-top-nav .menu::-webkit-scrollbar{display:none}
#shared-top-nav .menu a{color:#cdd5e4;text-decoration:none;font-size:15px;margin-right:16px}
#shared-top-nav .menu a.active{color:#fff;font-weight:700}
#shared-top-nav .nav-right button.shared-log-button,#shared-top-nav .nav-right button.shared-upgrade-button{color:#fff;text-decoration:none;font-size:14px;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:transparent;font-family:inherit;line-height:1;cursor:pointer;white-space:nowrap}
#shared-top-nav .theme-toggle{display:inline-flex;align-items:center;gap:6px;font-size:13px}
#shared-top-nav .theme-toggle button{height:30px;padding:0 10px;border-radius:999px;border:1px solid rgba(148,163,184,.45);background:transparent;color:var(--navInk,#f6f7fb);cursor:pointer}
#shared-top-nav .theme-toggle button.label{cursor:default;opacity:.92}
#shared-top-nav .theme-toggle button.active{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18);color:#fff}
.shared-upgrade-modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.62);z-index:1000;padding:18px}
.shared-upgrade-modal.show{display:flex}
.shared-upgrade-panel{width:min(760px,96vw);max-height:86vh;background:var(--card,#fff);color:var(--ink,#0f172a);border:1px solid rgba(148,163,184,.35);border-radius:10px;box-shadow:0 24px 80px rgba(15,23,42,.28);overflow:hidden}
.shared-upgrade-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(148,163,184,.25);font-weight:700}
.shared-upgrade-head button{border:0;background:transparent;color:inherit;font-size:24px;line-height:1;cursor:pointer}
.shared-upgrade-log{margin:0;padding:14px 16px;min-height:260px;max-height:58vh;overflow:auto;background:rgba(15,23,42,.95);color:#dbeafe;font:12px/1.5 ui-monospace,SFMono-Regular,Consolas,monospace;white-space:pre-wrap}
.shared-upgrade-foot{padding:10px 16px;border-top:1px solid rgba(148,163,184,.25);font-size:13px;color:var(--muted,#64748b)}
.shared-log-modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.62);z-index:1000;padding:18px}
.shared-log-modal.show{display:flex}
.shared-log-panel{width:min(1040px,96vw);max-height:88vh;background:var(--card,#fff);color:var(--ink,#0f172a);border:1px solid rgba(148,163,184,.35);border-radius:10px;box-shadow:0 24px 80px rgba(15,23,42,.28);overflow:hidden;display:flex;flex-direction:column}
.shared-log-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(148,163,184,.25);font-weight:700}
.shared-log-head button{border:0;background:transparent;color:inherit;font-size:24px;line-height:1;cursor:pointer}
.shared-log-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid rgba(148,163,184,.22)}
.shared-log-levels{display:inline-flex;gap:6px}
.shared-log-tools button{height:32px;border-radius:8px;border:1px solid rgba(148,163,184,.45);background:transparent;color:inherit;padding:0 10px;cursor:pointer}
.shared-log-tools button.active{background:rgba(37,99,235,.13);border-color:rgba(37,99,235,.45);color:#1d4ed8}
.shared-log-tools input{height:32px;min-width:260px;flex:1;border-radius:8px;border:1px solid rgba(148,163,184,.45);background:transparent;color:inherit;padding:0 10px}
.shared-log-meta{padding:8px 16px;font-size:13px;color:var(--muted,#64748b)}
.shared-log-table-wrap{overflow:auto;max-height:54vh;border-top:1px solid rgba(148,163,184,.16);border-bottom:1px solid rgba(148,163,184,.16)}
.shared-log-table{width:100%;border-collapse:collapse;font-size:13px}
.shared-log-table th,.shared-log-table td{padding:8px 10px;border-bottom:1px solid rgba(148,163,184,.18);text-align:left;vertical-align:top}
.shared-log-table th{position:sticky;top:0;background:var(--card,#fff);z-index:1}
.shared-log-raw{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;white-space:pre-wrap;word-break:break-word}
.shared-log-level{font-weight:700;text-transform:uppercase}
.shared-log-level.info{color:#2563eb}
.shared-log-level.warning{color:#d97706}
.shared-log-level.error{color:#dc2626}
.shared-log-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px;font-size:13px;color:var(--muted,#64748b)}
.shared-log-foot button{height:32px;border-radius:8px;border:1px solid rgba(148,163,184,.45);background:transparent;color:inherit;padding:0 10px;cursor:pointer}
.shared-log-foot button:disabled{opacity:.45;cursor:not-allowed}
@media (max-width:980px){#shared-top-nav .menu{display:none}}
</style>
<div id="shared-top-nav" class="nav">
  <div class="nav-left">
    <div class="brand">ETH Liquidation Map</div>
    <div class="menu">
      <a href="/market-info"{{if eq .ActivePath "/market-info"}} class="active"{{end}}>市场信息</a>
      <a href="/monitor"{{if eq .ActivePath "/monitor"}} class="active"{{end}}>雷区监控</a>
      <a href="/map"{{if eq .ActivePath "/map"}} class="active"{{end}}>盘口汇总</a>
      <a href="/liquidations"{{if eq .ActivePath "/liquidations"}} class="active"{{end}}>强平清算</a>
      <a href="/bubbles"{{if eq .ActivePath "/bubbles"}} class="active"{{end}}>气泡图</a>
      <a href="/webdatasource"{{if eq .ActivePath "/webdatasource"}} class="active"{{end}}>页面数据源</a>
      <a href="/channel"{{if eq .ActivePath "/channel"}} class="active"{{end}}>消息通道</a>
      <a href="/analysis"{{if eq .ActivePath "/analysis"}} class="active"{{end}}>日内分析</a>
      <a href="/analysis-backtest"{{if eq .ActivePath "/analysis-backtest"}} class="active"{{end}}>单因子回测</a>
      <a href="/analysis-backtest-2fa"{{if eq .ActivePath "/analysis-backtest-2fa"}} class="active"{{end}}>双因子回测</a>
      <a href="/analysis-backtest-liquidation"{{if eq .ActivePath "/analysis-backtest-liquidation"}} class="active"{{end}}>多多空空</a>
    </div>
  </div>
  <div class="nav-right">
    <button type="button" class="shared-log-button" onclick="return sharedDoOpenLogs(event)">日志</button>
    <div class="theme-toggle">
      <button class="label" type="button">主题</button>
      <button id="themeDark" type="button" onclick="if(window.setTheme)window.setTheme('dark')">深色</button>
      <button id="themeLight" type="button" onclick="if(window.setTheme)window.setTheme('light')">浅色</button>
    </div>
    <button type="button" class="upgrade shared-upgrade-button" onclick="return sharedDoUpgrade(event)">升级</button>
  </div>
</div>
<div id="sharedLogModal" class="shared-log-modal" aria-hidden="true">
  <div class="shared-log-panel" role="dialog" aria-modal="true" aria-labelledby="sharedLogTitle">
    <div class="shared-log-head">
      <span id="sharedLogTitle">运行日志</span>
      <button type="button" onclick="sharedCloseLogModal()" aria-label="关闭">&times;</button>
    </div>
    <div class="shared-log-tools">
      <div class="shared-log-levels">
        <button type="button" data-log-level="all" class="active" onclick="sharedSetLogLevel('all')">全部</button>
        <button type="button" data-log-level="info" onclick="sharedSetLogLevel('info')">Info</button>
        <button type="button" data-log-level="warning" onclick="sharedSetLogLevel('warning')">Warning</button>
        <button type="button" data-log-level="error" onclick="sharedSetLogLevel('error')">Error</button>
      </div>
      <input id="sharedLogQuery" type="search" placeholder="关键词搜索" onkeydown="if(event.key==='Enter')sharedApplyLogSearch()">
      <button type="button" onclick="sharedApplyLogSearch()">搜索</button>
      <button type="button" onclick="sharedResetLogSearch()">清空</button>
    </div>
    <div id="sharedLogMeta" class="shared-log-meta">每页 20 条</div>
    <div class="shared-log-table-wrap">
      <table class="shared-log-table">
        <thead><tr><th style="width:150px">时间</th><th style="width:88px">级别</th><th>内容</th></tr></thead>
        <tbody id="sharedLogBody"><tr><td colspan="3">等待加载</td></tr></tbody>
      </table>
    </div>
    <div class="shared-log-foot">
      <span id="sharedLogPageInfo">第 1 页</span>
      <div>
        <button id="sharedLogPrev" type="button" onclick="sharedLoadLogs(sharedLogState.page-1)">上一页</button>
        <button id="sharedLogNext" type="button" onclick="sharedLoadLogs(sharedLogState.page+1)">下一页</button>
      </div>
    </div>
  </div>
</div>
<div id="sharedUpgradeModal" class="shared-upgrade-modal" aria-hidden="true">
  <div class="shared-upgrade-panel" role="dialog" aria-modal="true" aria-labelledby="sharedUpgradeTitle">
    <div class="shared-upgrade-head">
      <span id="sharedUpgradeTitle">系统升级</span>
      <button type="button" onclick="sharedCloseUpgradeModal()" aria-label="关闭">&times;</button>
    </div>
    <pre id="sharedUpgradeLog" class="shared-upgrade-log"></pre>
    <div id="sharedUpgradeFoot" class="shared-upgrade-foot">等待触发</div>
  </div>
</div>
<script id="shared-upgrade-script">
const sharedLogState={page:1,totalPages:0,level:'all',q:''};
function sharedEscapeHTML(value){
  return String(value==null?'':value).replace(/[&<>"']/g,function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}
function sharedDoOpenLogs(event){
  if(event) event.preventDefault();
  sharedOpenLogModal();
  return false;
}
function sharedOpenLogModal(){
  const modal=document.getElementById('sharedLogModal');
  if(!modal) return;
  modal.classList.add('show');
  modal.setAttribute('aria-hidden','false');
  sharedLoadLogs(1);
}
function sharedCloseLogModal(){
  const modal=document.getElementById('sharedLogModal');
  if(!modal) return;
  modal.classList.remove('show');
  modal.setAttribute('aria-hidden','true');
}
function sharedSetLogLevel(level){
  sharedLogState.level=String(level||'all');
  document.querySelectorAll('[data-log-level]').forEach(function(btn){
    btn.classList.toggle('active',btn.getAttribute('data-log-level')===sharedLogState.level);
  });
  sharedLoadLogs(1);
}
function sharedApplyLogSearch(){
  const input=document.getElementById('sharedLogQuery');
  sharedLogState.q=input?String(input.value||'').trim():'';
  sharedLoadLogs(1);
}
function sharedResetLogSearch(){
  const input=document.getElementById('sharedLogQuery');
  if(input) input.value='';
  sharedLogState.q='';
  sharedSetLogLevel('all');
}
async function sharedLoadLogs(page){
  page=Math.max(1,Number(page||1));
  const body=document.getElementById('sharedLogBody');
  const meta=document.getElementById('sharedLogMeta');
  const pageInfo=document.getElementById('sharedLogPageInfo');
  const prev=document.getElementById('sharedLogPrev');
  const next=document.getElementById('sharedLogNext');
  if(body) body.innerHTML='<tr><td colspan="3">加载中...</td></tr>';
  const params=new URLSearchParams({page:String(page),limit:'20',level:sharedLogState.level||'all',q:sharedLogState.q||''});
  try{
    const resp=await fetch('/api/logs?'+params.toString(),{cache:'no-store'});
    const data=await resp.json().catch(()=>({rows:[],total:0,total_pages:0,error:'response parse failed'}));
    if(!resp.ok){
      throw new Error(data.error||('HTTP '+resp.status));
    }
    sharedLogState.page=Number(data.page||page);
    sharedLogState.totalPages=Number(data.total_pages||0);
    const rows=Array.isArray(data.rows)?data.rows:[];
    if(!rows.length){
      body.innerHTML='<tr><td colspan="3">暂无日志记录</td></tr>';
    }else{
      body.innerHTML=rows.map(function(row){
        const level=String(row.level||'info');
        return '<tr><td>'+sharedEscapeHTML(row.ts||'-')+'</td><td><span class="shared-log-level '+sharedEscapeHTML(level)+'">'+sharedEscapeHTML(level)+'</span></td><td class="shared-log-raw">'+sharedEscapeHTML(row.message||row.raw||'')+'</td></tr>';
      }).join('');
    }
    if(meta) meta.textContent='每页 20 条 | 共 '+Number(data.total||0)+' 条 | '+sharedEscapeHTML(data.path||'log/server.log');
    if(pageInfo) pageInfo.textContent='第 '+sharedLogState.page+' / '+Math.max(1,sharedLogState.totalPages||1)+' 页';
    if(prev) prev.disabled=sharedLogState.page<=1;
    if(next) next.disabled=sharedLogState.totalPages<=0||sharedLogState.page>=sharedLogState.totalPages;
  }catch(err){
    if(body) body.innerHTML='<tr><td colspan="3">加载失败: '+sharedEscapeHTML(err&&err.message?err.message:err)+'</td></tr>';
    if(meta) meta.textContent='每页 20 条';
    if(pageInfo) pageInfo.textContent='第 '+page+' 页';
    if(prev) prev.disabled=page<=1;
    if(next) next.disabled=true;
  }
}
async function sharedOpenUpgradeModal(){
  const modal=document.getElementById('sharedUpgradeModal');
  const logEl=document.getElementById('sharedUpgradeLog');
  const foot=document.getElementById('sharedUpgradeFoot');
  if(!modal||!logEl||!foot) return;
  modal.classList.add('show');
  modal.setAttribute('aria-hidden','false');
  logEl.textContent='';
  foot.textContent='正在触发升级...';
  let data={};
  try{
    const r=await fetch('/api/upgrade/pull',{method:'POST'});
    data=await r.json().catch(()=>({}));
    if(!r.ok||data.error){
      logEl.textContent=String(data.output||'');
      foot.textContent='触发失败: '+String(data.error||('HTTP '+r.status));
      return;
    }
  }catch(err){
    foot.textContent='触发失败: '+String(err&&err.message?err.message:err);
    return;
  }
  foot.textContent='已触发，正在执行...';
  let stable=0;
  for(let i=0;i<180;i++){
    await new Promise(resolve=>setTimeout(resolve,1000));
    const progress=await fetch('/api/upgrade/progress').then(r=>r.json()).catch(()=>null);
    if(!progress) continue;
    logEl.textContent=String(progress.log||'');
    logEl.scrollTop=logEl.scrollHeight;
    if(progress.done){
      foot.textContent=String(progress.exit_code||'')==='0'?'升级完成并已重启':'升级完成，退出码 '+String(progress.exit_code||'?');
      return;
    }
    if(!progress.running) stable++; else stable=0;
    if(stable>=3){
      foot.textContent='升级进程已结束，但状态未知，请检查日志';
      return;
    }
  }
  foot.textContent='升级仍在进行，请稍后再看';
}
function sharedCloseUpgradeModal(){
  const modal=document.getElementById('sharedUpgradeModal');
  if(!modal) return;
  modal.classList.remove('show');
  modal.setAttribute('aria-hidden','true');
}
function sharedDoUpgrade(event){
  if(event) event.preventDefault();
  sharedOpenUpgradeModal();
  return false;
}
</script>
