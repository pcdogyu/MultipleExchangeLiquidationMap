<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日内分析</title>
<style>
:root{--bg:#f4efe7;--ink:#172033;--muted:#63708a;--card:#fffdf8;--line:#e5dccd;--nav:#101827;--navInk:#f6f7fb;--accent:#c26a2d;--accent2:#14746f;--danger:#bf3b3b;--good:#24805e;--shadow:0 12px 36px rgba(17,24,39,.08)}
[data-theme="dark"]{--bg:#000;--ink:#f8fafc;--muted:#cbd5e1;--card:#000;--line:#263041;--nav:#000;--navInk:#f8fafc;--accent:#f59e0b;--accent2:#5eead4;--danger:#f87171;--good:#4ade80;--shadow:none}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top left,#fff8ee,transparent 28%),linear-gradient(180deg,#f8f4ed 0%,#efe8dc 100%);color:var(--ink);font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
[data-theme="dark"] body{background:#000}
.nav{height:58px;background:var(--nav);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:20}
.nav-left,.nav-right{display:flex;align-items:center;gap:20px}
.brand{font-size:18px;font-weight:700;color:var(--navInk)}
.menu a{color:#cdd5e4;text-decoration:none;font-size:15px;margin-right:16px}
.menu a.active{color:#fff;font-weight:700}
.nav-right a{color:#fff;text-decoration:none;font-size:14px;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.18)}
.wrap{max-width:1180px;margin:0 auto;padding:24px 18px 40px}
.hero{display:grid;grid-template-columns:1.3fr .7fr;gap:16px;margin-bottom:16px}
.panel{background:rgba(255,253,248,.92);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
.hero-main{padding:24px 24px 20px;background:linear-gradient(140deg,rgba(194,106,45,.15),rgba(20,116,111,.08)),var(--card)}
.hero-side{padding:22px;display:grid;gap:12px}
.eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
h1{margin:10px 0 10px;font-size:34px;line-height:1.15}
.hero p{margin:0;color:#42506a;line-height:1.65}
.statline{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:14px 0;border-bottom:1px dashed var(--line)}
.statline:last-child{border-bottom:0}
.statline .label{font-size:12px;color:var(--muted)}
.statline .value{font-size:26px;font-weight:700}
.section{margin-top:18px}
.section h2{margin:0;font-size:17px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 10px}
.section-head-main{display:flex;align-items:center;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.card{padding:18px}
.small{font-size:12px;color:var(--muted);line-height:1.6}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}
.pill.high{background:rgba(191,59,59,.12);color:var(--danger)}
.pill.medium{background:rgba(194,106,45,.12);color:var(--accent)}
.pill.low{background:rgba(36,128,94,.12);color:var(--good)}
.pill.up{background:rgba(194,106,45,.12);color:var(--accent)}
.pill.down{background:rgba(20,116,111,.12);color:var(--accent2)}
.pill.flat{background:rgba(99,112,138,.12);color:var(--muted)}
.broadcast{padding:18px 20px;background:linear-gradient(135deg,rgba(20,116,111,.11),rgba(194,106,45,.10))}
.broadcast h3{margin:0 0 10px;font-size:20px}
.broadcast p{margin:0;color:#2f405b;line-height:1.7}
.broadcast ul{margin:12px 0 0;padding-left:18px;color:#40506a}
.metric-card{padding:18px;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.72));border:1px solid var(--line);border-radius:18px}
.metric-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.metric-head{display:flex;align-items:center;gap:8px}
.help{position:relative;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:999px;border:1px solid #c8d2e3;background:#fff;color:#50607d;font-size:11px;font-weight:800;cursor:help;flex:0 0 auto}
.help-tip{position:absolute;top:24px;right:0;z-index:5;display:none;min-width:240px;max-width:320px;padding:10px 12px;border-radius:12px;background:#172033;color:#f6f7fb;font-size:12px;line-height:1.6;box-shadow:0 12px 30px rgba(17,24,39,.22);white-space:normal;text-align:left}
.help-tip.wide{min-width:360px;max-width:520px}
.help:hover .help-tip{display:block}
.metric-value{font-size:30px;font-weight:800;line-height:1.1;margin-top:10px}
.metric-sub{font-size:13px;color:#38465e;margin-top:8px}
.metric-push{font-size:12px;color:#42506a;margin-top:8px;font-weight:600}
.metric-push.up{color:var(--accent)}
.metric-push.down{color:var(--accent2)}
.metric-push.flat{color:var(--muted)}
.score{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.score .num{font-size:38px;font-weight:800;line-height:1}
.zone{padding:16px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.58)}
.zone-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:8px}
.zone-price{font-size:28px;font-weight:800}
.zone-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.trend-card{padding:16px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.72));display:flex;flex-direction:column;gap:10px;min-height:224px}
.trend-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.trend-value{font-size:30px;font-weight:800;line-height:1.05}
.trend-sub{font-size:12px;color:#42506a;line-height:1.6}
.trend-chart{height:92px;border-radius:14px;background:linear-gradient(180deg,rgba(194,106,45,.06),rgba(20,116,111,.08));border:1px solid rgba(99,112,138,.10);padding:8px}
.trend-chart svg{display:block;width:100%;height:100%}
.trend-grid{stroke:rgba(99,112,138,.18);stroke-width:1}
.trend-line{fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.trend-line.up{stroke:var(--accent)}
.trend-line.down{stroke:var(--accent2)}
.trend-line.flat{stroke:#516179}
.trend-axis{display:flex;justify-content:space-between;gap:12px;font-size:11px;color:var(--muted)}
.exchange-card{padding:18px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.66)}
.exchange-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.exchange-name{font-size:22px;font-weight:800}
.exchange-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
.kv{padding:10px 12px;border-radius:14px;background:#fff;border:1px solid var(--line)}
.kv .k{font-size:12px;color:var(--muted)}
.kv .v{font-size:20px;font-weight:800;margin-top:4px}
.backtest{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start}
.rates{display:flex;gap:10px;flex-wrap:wrap}
.rate{min-width:106px;padding:12px 14px;border-radius:16px;background:#fff;border:1px solid var(--line)}
.rate .k{font-size:12px;color:var(--muted)}
.rate .v{font-size:24px;font-weight:800;margin-top:6px}
.footer{margin-top:20px;font-size:12px;color:var(--muted);text-align:center}
[data-theme="dark"] .panel,[data-theme="dark"] .metric-card,[data-theme="dark"] .trend-card,[data-theme="dark"] .exchange-card,[data-theme="dark"] .zone,[data-theme="dark"] .rate,[data-theme="dark"] .kv{background:#000;border-color:var(--line);box-shadow:none}
[data-theme="dark"] .hero-main,[data-theme="dark"] .broadcast,[data-theme="dark"] .trend-chart{background:#000}
[data-theme="dark"] .broadcast p,[data-theme="dark"] .broadcast ul,[data-theme="dark"] .hero p,[data-theme="dark"] .metric-sub,[data-theme="dark"] .metric-push,[data-theme="dark"] .trend-sub{color:#e2e8f0}
[data-theme="dark"] .help{background:#000;color:#e2e8f0;border-color:#475569}
@media (max-width:1080px){.grid4,.grid3,.grid2,.exchange-grid,.backtest{grid-template-columns:1fr 1fr}}
@media (max-width:980px){.hero,.grid4,.grid3,.grid2,.exchange-grid,.backtest{grid-template-columns:1fr}.menu{display:none}}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-left">
    <div class="brand">ETH Liquidation Map</div>
    <div class="menu">
      <a href="/">清算热区</a>
      <a href="/config">模型配置</a>
      <a href="/monitor">雷区监控</a>
      <a href="/map">盘口汇总</a>
      <a href="/liquidations">强平清算</a>
      <a href="/bubbles">气泡图</a>
      <a href="/webdatasource">页面数据源</a>
      <a href="/channel">消息通道</a>
      <a href="/analysis" class="active">日内分析</a>
    </div>

  <div class="nav-right">
    <a href="/config">调整参数</a>
  </div>
</div>
<div class="wrap" id="analysisCapture">
  <div class="hero">
    <div class="panel hero-main">
      <div class="eyebrow">Intraday Analysis</div>
      <h1 id="title">加载中...</h1>
      <p id="summary">正在汇总当前市场结论、风险评分、关键清算区间和简单回测。</p>
    </div>
    <div class="panel hero-side">
      <div class="statline"><div><div class="label">当前价格</div><div class="value" id="currentPrice">-</div></div><div class="small" id="symbol">-</div></div>
      <div class="statline"><div><div class="label">结论置信度</div><div class="value" id="confidence">-</div></div><div class="small">基于近端热区不平衡、资金费率和最近强区距离</div></div>
      <div class="statline"><div><div class="label">更新时间</div><div class="value" id="updatedAt" style="font-size:18px">-</div></div><div class="small">页面每 30 秒自动刷新</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-head"><div class="section-head-main"><h2 data-section-title="broadcast"></h2><span id="help-broadcast"></span></div></div>
    <div class="panel broadcast">
      <h3 id="broadcastHeadline">加载中...</h3>
      <p id="broadcastText">正在生成播报摘要...</p>
      <ul id="broadcastBullets"></ul>
    </div>
  </div>

  <div class="section">
    <div class="section-head"><div class="section-head-main"><h2 data-section-title="indicators"></h2><span id="help-indicators"></span></div></div>
    <div class="grid4" id="indicators"></div>
  </div>

  <div class="section">
    <div class="section-head"><div class="section-head-main"><h2 data-section-title="scores"></h2><span id="help-scores"></span></div></div>
    <div class="grid3" id="scores"></div>
  </div>

  <div class="section">
    <div class="section-head"><div class="section-head-main"><h2 data-section-title="zones"></h2><span id="help-zones"></span></div></div>
    <div class="grid2" id="zones"></div>
  </div>

  <div class="section">
    <div class="section-head"><div class="section-head-main"><h2 data-section-title="changes"></h2><span id="help-changes"></span></div></div>
    <div class="grid4" id="changes"></div>
  </div>

  <div class="section">
    <div class="section-head"><div class="section-head-main"><h2 data-section-title="exchanges"></h2><span id="help-exchanges"></span></div></div>
    <div class="grid3" id="exchangeCards"></div>
  </div>

  <div class="section">
    <div class="section-head"><div class="section-head-main"><h2 data-section-title="backtest"></h2><span id="help-backtest"></span></div></div>
    <div class="panel card">
      <div class="backtest">
        <div>
          <div id="backtestSummary" style="font-size:16px;font-weight:700;line-height:1.6">加载中...</div>
          <div class="small" id="backtestMeta" style="margin-top:8px"></div>
        </div>
        <div class="rates" id="rates"></div>
      </div>
    </div>
  </div>

  <div class="footer" id="footer">analysis loading...</div>
</div>
<script>
function esc(s){return String(s==null?'':s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');}
function fmtPrice(v){const n=Number(v||0);return isFinite(n)&&n>0?n.toFixed(1):'-';}
function fmtPct(v){const n=Number(v||0);return isFinite(n)?n.toFixed(0)+'%':'-';}
function fmtMoney(v){const n=Number(v||0);if(!isFinite(n)) return '-';if(Math.abs(n)>=1e8) return (n/1e8).toFixed(2)+' 亿';if(Math.abs(n)>=1e4) return (n/1e4).toFixed(1)+' 万';return n.toFixed(0);}
function fmtSigned(v,unit){const n=Number(v||0);if(!isFinite(n)) return '-';if(unit==='USD') return (n>=0?'+':'')+fmtMoney(n);if(unit==='rate') return (n>=0?'+':'')+n.toFixed(6);return (n>=0?'+':'')+n.toFixed(2);}
function fmtTime(ts){const n=Number(ts||0);if(!n) return '-';const d=new Date(n);const p=x=>String(x).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());}
function scoreToneLabel(score){const n=Number(score||0);if(n>=80) return '高风险';if(n>=65) return '偏高';if(n>=50) return '中性偏高';if(n>=35) return '中性';return '偏低';}
function pillLabel(tone){if(tone==='high') return '高关注';if(tone==='medium') return '中等';if(tone==='low') return '偏弱';if(tone==='up') return '偏上';if(tone==='down') return '偏下';return '中性';}
function indicatorPushMeta(it){
  const label=String((it&&it.label)||'');
  const value=String((it&&it.value)||'');
  const sub=String((it&&it.subvalue)||'');
  const note=String((it&&it.note)||'');
  if(label.includes('压力偏向')){
    const n=Number(value.replace(/[^\d.+-]/g,''));
    if(Number.isFinite(n) && n>1) return {tone:'up',text:'推动方向：偏向价格向上推动'};
    if(Number.isFinite(n) && n<-1) return {tone:'down',text:'推动方向：偏向价格向下推动'};
    return {tone:'flat',text:'推动方向：当前较中性'};
  }
  if(sub.includes('主带上移')) return {tone:'up',text:'推动方向：偏向价格向上推动'};
  if(sub.includes('主带下移')) return {tone:'down',text:'推动方向：偏向价格向下推动'};
  if(sub.includes('上方空头清算带') || note.includes('上方空头清算带')) return {tone:'up',text:'推动方向：偏向价格向上推动'};
  if(sub.includes('下方多头清算带') || note.includes('下方多头清算带')) return {tone:'down',text:'推动方向：偏向价格向下推动'};
  return {tone:'flat',text:'推动方向：当前较中性'};
}
function indicatorFormula(label){
  const text=String(label||'');
  if(text.includes('重合强度')) return '公式：100 - min(100, 跨周期最高柱最大价差 / 3)。仅统计主导一侧在 1D / 7D / 30D 的最高柱；窗口越齐、价差越小，分数越高。';
  if(text.includes('迁移速度')) return '公式：平均(|当前主清算带价格 - 上一份同窗口主清算带价格|) / 时间间隔(小时)。分别计算 1D、7D、30D 后取平均。';
  if(text.includes('现价到主清算带距离')) return '公式：|主导清算带加权价格 - 当前价格|。主导清算带价格 = Σ(价格 × 最高柱强度) / Σ最高柱强度；同时展示相对现价百分比。';
  if(text.includes('压力偏向')) return '公式：(上方空头清算带加权强度 - 下方多头清算带加权强度) / max(总强度, 1) × 100。正值偏向上方扫空，负值偏向下方踩踏。';
  return '基于 1D / 7D / 30D 页面清算分布计算。';
}
function helpBubble(label){
  return '<span class="help">?<span class="help-tip">'+esc(indicatorFormula(label))+'</span></span>';
}

function setTheme(t){
  const theme=(t==='dark')?'dark':'light';
  document.documentElement.setAttribute('data-theme',theme);
}

function initTheme(){
  let t='light';
  try{t=localStorage.getItem('theme')||'light';}catch(_){}
  setTheme(t);
}

function sectionHelpText(key){
  const text=String(key||'');
  if(text==='broadcast') return '这个区块是把整页分析结果压缩成适合快速阅读和播报的摘要，不是重新计算一套独立信号，而是把当前价格、主导风险方向、关键清算区位置、多周期推动指标、最近数小时的变化以及回测命中情况合并成一句结论和几条要点。它的价值在于帮助你先抓住“现在市场最值得盯什么”，再决定要不要继续下钻看每张卡片。这里如果写的是偏上冲挤空，通常意味着上方空头清算更密集、价格更容易被拉向上方风险区；如果写的是偏下探踩踏，通常说明下方多头清算更密集、价格一旦转弱更容易加速。它适合做盘前预判、盘中速览和消息播报，但不适合脱离下面的结构卡片单独使用，真正做交易时还是要结合关键价位距离、变化斜率和交易所拆分一起看。';
  if(text==='indicators') return '多周期清算带指标关注的是 1 天、7 天、30 天三个时间尺度里最值得警惕的清算堆积结构。这里既看重合，也看迁移，还看现价与主带距离和多空压力偏向。重合强度高，说明不同周期的高风险带集中在相近价格附近，这种位置更容易成为“被价格反复试探的磁吸区”。迁移速度快，说明筹码和杠杆分布正在换手，旧的风险带可能失效，新的主风险带正在生成。现价到主清算带距离近，说明价格接近高敏感区，波动放大的概率更高。多空压力偏向为正，通常意味着上方空头清算带更重，更容易出现向上挤压；为负则意味着下方多头清算带更重，更容易出现向下踩踏。这个区块更适合判断方向和结构，不是直接给进出场点，而是告诉你市场现在最可能朝哪一边去释放杠杆。';
  if(text==='scores') return '多空风险评分把复杂的清算分布、现价与关键区距离、资金费率状态以及最近实际强平情况压缩成几项 0 到 100 的风险刻度。空头被挤压风险高，不代表价格一定马上上涨，而是代表一旦向上突破，上方空头更容易被连续清算，从而推高波动；多头被踩踏风险高也同理，代表向下跌破后更容易触发连锁踩踏。短线波动放大风险则更像一个“环境变量”，它高时说明市场已经处在容易扩张的阶段，此时任何方向的突破都更可能走得更快。看这个区块不要只看绝对分数，更要看多空两边的分差：分差越大，说明结构越单边；分差很小，说明市场更可能维持震荡、来回扫流动性。如果你只看一个数字而不看分差、现价位置和关键区距离，就很容易把“风险高”误解成“必然马上发生”。';
  if(text==='zones') return '关键清算区间是这页里最接近实战价格地图的部分，它直接告诉你上方和下方有哪些价格带最容易成为波动触发点。上方最近强清算区更适合观察挤空触发，下方最近强清算区更适合观察踩踏触发；而即时压力带、即时支撑带则离现价更近，偏向短线交易盯盘使用。这里最重要的不是单纯记住某个价格，而是看“离现价还有多远”“对应强度有多大”“这个区间属于上方还是下方”。距离近但强度弱，往往只是噪声；距离适中但强度大，往往更值得提前设预案。价格靠近这些区间时，应该联动看上面的多周期指标和下面的变化折线：如果结构方向、分数偏向和关键区位置一致，信号会更扎实；如果互相冲突，通常意味着市场仍在震荡整理，贸然追单的性价比不高。';
  if(text==='changes') return '近几小时变化摘要不是看静态快照，而是看过去 24 小时里结构怎么演变。20、50、80、100、200、300 点推动指数分别衡量不同距离带内，上方清算压力和下方清算压力的相对强弱；数值向上，通常表示价格更容易被上方结构牵引，数值向下则说明下方踩踏压力更重。4 小时清算量折线用于判断市场是否已经进入强制去杠杆阶段，若它快速抬升，说明波动环境正在变差。资金费率变化则帮助区分当前是多头过热还是空头过热。这里最关键的是看趋势而不是只看最新值：如果多个点位指数同步抬升，代表推动方向在扩散；如果只有近端 20 或 50 点抬升，而远端仍平，往往只是短线扫流动性；如果近端和远端同时转弱，再配合清算量放大，通常意味着结构已经从震荡切到趋势释放。';
  if(text==='exchanges') return '按交易所拆分的分析卡片用来回答一个重要问题：风险究竟集中在哪家交易所、哪边仓位、什么价位。不同交易所的用户结构、杠杆偏好和流动性分布并不一样，所以同样是 ETH，某家交易所可能上方空头更重，另一家则可能下方多头更重。这里的标记价格、OI 美元值、资金费率、多空比、近 1 小时清算额和关注价位，组合起来能帮助你判断“谁在主导市场节奏”。如果主导交易所和总盘面方向一致，信号可信度通常更高；如果总盘面偏上，但主导交易所的空头风险并不高，说明上冲可能缺乏持续性。交易所拆分尤其适合在异动时用来查源头，看看是单家平台在先动，还是全市场都在同步调整，这对判断真假突破很有帮助。';
  if(text==='backtest') return '简单回测 / 命中统计是为了给前面的结构判断一个历史参照，而不是制造“未来一定会复制过去”的错觉。这里通常会统计过去 24 小时或最近一段样本里，当系统识别出当前这类热区结构后，后续一段时间命中 ±20、±50、±100 区间的概率，以及平均最大偏移。命中率高，说明这种结构过去更容易引发价格去试探这些区间；命中率低，则说明当前结构虽然看起来有压力，但历史上并不稳定。需要注意的是，回测样本越少、市场环境越变化、交易所结构越不一致，这些统计值的参考意义就越弱。所以看回测时要重点留意样本量、预测窗口和加权误差，不要把它当成直接下单按钮，而应该把它理解为“当前结构在最近市场环境里是否真的有用”的质量检查。';
  return '这个问号用于解释当前区块的数据来源、计算思路和解读方式。分析页里的每一块都不是孤立数字，而是把页面数据源、交易所快照、资金费率、强平事件和关键区距离拼在一起做结构化展示。正确的用法不是只盯一个值，而是横向比不同区块、纵向比最近 24 小时变化，再结合现价位置判断市场更可能向上挤空、向下踩踏，还是继续震荡。';
}

function sectionTitleText(key){
  const titles={
    broadcast:'AI 文本播报摘要',
    indicators:'多周期清算带指标',
    scores:'多空风险评分',
    zones:'关键清算区间',
    changes:'近几小时变化摘要',
    exchanges:'按交易所拆分的分析卡片',
    backtest:'简单回测 / 命中统计'
  };
  return titles[key]||'分析区块';
}

function sectionHelpBubble(key){
  return '<span class="help">?<span class="help-tip wide">'+esc(sectionHelpText(key))+'</span></span>';
}

function mountSectionHelp(){
  const pairs=[['help-broadcast','broadcast'],['help-indicators','indicators'],['help-scores','scores'],['help-zones','zones'],['help-changes','changes'],['help-exchanges','exchanges'],['help-backtest','backtest']];
  pairs.forEach(([id,key])=>{
    const el=document.getElementById(id);
    if(el) el.innerHTML=sectionHelpBubble(key);
    const title=document.querySelector('[data-section-title=\"'+key+'\"]');
    if(title) title.textContent=sectionTitleText(key);
  });
}

function formatTrendValue(v,unit){
  const n=Number(v||0);
  if(!isFinite(n)) return '-';
  if(unit==='USD') return fmtMoney(n);
  if(unit==='rate') return (n>=0?'+':'')+n.toFixed(6);
  if(unit==='score') return (n>=0?'+':'')+n.toFixed(1);
  return (n>=0?'+':'')+n.toFixed(1);
}

function sparkline(series,tone){
  const pts=Array.isArray(series)?series:[];
  if(!pts.length){
    return '<div class="trend-chart"><svg viewBox="0 0 240 76" preserveAspectRatio="none"><line class="trend-grid" x1="0" y1="38" x2="240" y2="38"></line></svg></div>';
  }
  const values=pts.map(it=>Number(it&&it.value||0)).filter(v=>isFinite(v));
  if(!values.length){
    return '<div class="trend-chart"><svg viewBox="0 0 240 76" preserveAspectRatio="none"><line class="trend-grid" x1="0" y1="38" x2="240" y2="38"></line></svg></div>';
  }
  const min=Math.min.apply(null,values);
  const max=Math.max.apply(null,values);
  const span=(max-min)||1;
  const width=240;
  const height=76;
  const path=pts.map((it,idx)=>{
    const x=pts.length===1?width/2:(idx*(width/(pts.length-1)));
    const value=Number(it&&it.value||0);
    const y=height-(((value-min)/span)*(height-8))-4;
    return (idx===0?'M':'L')+x.toFixed(2)+','+y.toFixed(2);
  }).join(' ');
  return '<div class="trend-chart"><svg viewBox="0 0 240 76" preserveAspectRatio="none"><line class="trend-grid" x1="0" y1="38" x2="240" y2="38"></line><path class="trend-line '+esc(tone||'flat')+'" d="'+path+'"></path></svg></div>';
}

function renderChangeCard(it){
  const tone=it.tone||'flat';
  const pushTone=tone==='up'||tone==='down'?tone:'flat';
  const pushText=it.push_direction||'-';
  return '<div class="trend-card">'
    +'<div class="trend-top"><div class="small">'+esc(it.label||'-')+'</div><span class="pill '+tone+'">'+esc(pillLabel(tone))+'</span></div>'
    +'<div class="trend-value">'+formatTrendValue(it.value,it.unit)+'</div>'
    +'<div class="trend-sub">'+esc(it.subvalue||'-')+'</div>'
    +'<div class="metric-push '+pushTone+'">推动方向：'+esc(pushText)+'</div>'
    +sparkline(it.series,tone)
    +'<div class="trend-axis"><span>24h 前</span><span>现在</span></div>'
    +'<div class="small">'+esc(it.note||'-')+'</div>'
    +'</div>';
}

function showLoadError(message){
  const text=message||'分析接口加载失败';
  document.getElementById('title').textContent='加载失败';
  document.getElementById('summary').textContent=text;
  document.getElementById('broadcastHeadline').textContent='加载失败';
  document.getElementById('broadcastText').textContent=text;
  document.getElementById('broadcastBullets').innerHTML='';
  document.getElementById('indicators').innerHTML='<div class="panel card small">'+esc(text)+'</div>';
  document.getElementById('scores').innerHTML='<div class="panel card small">'+esc(text)+'</div>';
  document.getElementById('zones').innerHTML='<div class="panel card small">'+esc(text)+'</div>';
  document.getElementById('changes').innerHTML='<div class="panel card small">'+esc(text)+'</div>';
  document.getElementById('exchangeCards').innerHTML='<div class="panel card small">'+esc(text)+'</div>';
  document.getElementById('backtestSummary').textContent=text;
  document.getElementById('backtestMeta').textContent='请检查 /api/analysis 响应';
  document.getElementById('rates').innerHTML='';
  document.getElementById('footer').textContent=text;
}

async function load(){
  const r=await fetch('/api/analysis').catch(()=>null);
  if(!r){showLoadError('无法连接 /api/analysis');return;}
  if(!r.ok){showLoadError((await r.text().catch(()=>''))||('HTTP '+r.status));return;}
  const d=await r.json().catch(()=>null);
  if(!d){showLoadError('分析接口返回了无法解析的 JSON');return;}

  document.getElementById('title').textContent=d.overview?.title||'-';
  document.getElementById('summary').textContent=(d.overview?.bias||'')+'。'+(d.overview?.summary||'');
  document.getElementById('currentPrice').textContent=fmtPrice(d.current_price);
  document.getElementById('symbol').textContent=d.symbol||'-';
  document.getElementById('confidence').textContent=fmtPct(d.overview?.confidence);
  document.getElementById('updatedAt').textContent=fmtTime(d.generated_at);
  document.getElementById('footer').textContent='Dominant exchange: '+((d.dashboard&&d.dashboard.analytics&&d.dashboard.analytics.dominant_exchange)||'-')+' | Alert: '+((d.dashboard&&d.dashboard.analytics&&d.dashboard.analytics.alert&&d.dashboard.analytics.alert.level)||'-');

  document.getElementById('broadcastHeadline').textContent=d.broadcast?.headline||'-';
  document.getElementById('broadcastText').textContent=d.broadcast?.text||'-';
  document.getElementById('broadcastBullets').innerHTML=(d.broadcast?.bullets||[]).map(it=>'<li>'+esc(it)+'</li>').join('');

  const indicators=(d.indicators||[]).map(it=>{const push=indicatorPushMeta(it);return '<div class="metric-card"><div class="metric-top"><div class="metric-head"><div class="small">'+esc(it.label||'-')+'</div>'+helpBubble(it.label)+'</div><span class="pill '+(it.tone||'flat')+'">'+esc(pillLabel(it.tone))+'</span></div><div class="metric-value">'+esc(it.value||'-')+'</div><div class="metric-sub">'+esc(it.subvalue||'-')+'</div><div class="metric-push '+push.tone+'">'+esc(push.text)+'</div><div class="small" style="margin-top:10px">'+esc(it.note||'-')+'</div></div>';}).join('');
  document.getElementById('indicators').innerHTML=indicators||'<div class="panel card small">暂无多周期指标</div>';

  const scores=(d.risk_scores||[]).map(it=>'<div class="panel card"><div class="small">'+esc(it.label||'-')+'</div><div class="score"><div class="num">'+Math.round(Number(it.score||0))+'</div><span class="pill '+(it.tone||'low')+'">'+esc(scoreToneLabel(it.score))+'</span></div></div>').join('');
  document.getElementById('scores').innerHTML=scores||'<div class="panel card small">暂无评分</div>';

  const zones=(d.key_zones||[]).map(it=>'<div class="zone"><div class="zone-head"><div><div class="small">'+esc(it.name||'-')+'</div><div class="zone-price">'+fmtPrice(it.price)+'</div></div><span class="pill '+(it.side==='up'?'up':'down')+'">'+(it.side==='up'?'上方':'下方')+'</span></div><div class="small">'+esc(it.note||'-')+'</div><div class="zone-meta"><span class="small">距离现价 '+fmtPrice(it.distance)+'</span><span class="small">强度 '+fmtMoney(it.notional_usd)+' USD</span></div></div>').join('');
  document.getElementById('zones').innerHTML=zones||'<div class="panel card small">暂无关键区间</div>';

  const changes=(d.changes||[]).map(renderChangeCard).join('');
  document.getElementById('changes').innerHTML=changes||'<div class="panel card small">暂无变化摘要</div>';

  const cards=(d.exchange_cards||[]).map(it=>'<div class="exchange-card"><div class="exchange-top"><div><div class="exchange-name">'+esc(it.exchange||'-')+'</div><div class="small">'+esc(it.summary||'-')+'</div></div><span class="pill '+(it.focus_side||'flat')+'">'+esc(it.bias||'-')+'</span></div><div class="exchange-grid"><div class="kv"><div class="k">标记价格</div><div class="v">'+fmtPrice(it.mark_price)+'</div></div><div class="kv"><div class="k">OI 美元值</div><div class="v">'+fmtMoney(it.oi_value_usd)+'</div></div><div class="kv"><div class="k">空头风险分</div><div class="v">'+Math.round(Number(it.short_risk_score||0))+'</div></div><div class="kv"><div class="k">多头风险分</div><div class="v">'+Math.round(Number(it.long_risk_score||0))+'</div></div><div class="kv"><div class="k">资金费率</div><div class="v">'+Number(it.funding_rate||0).toFixed(6)+'</div></div><div class="kv"><div class="k">近 1 小时清算</div><div class="v">'+fmtMoney(it.recent_liquid_usd)+'</div></div><div class="kv"><div class="k">关注价位</div><div class="v">'+fmtPrice(it.focus_price)+'</div></div><div class="kv"><div class="k">多空比</div><div class="v">'+(Number(it.long_short_ratio||0)>0?Number(it.long_short_ratio||0).toFixed(2):'-')+'</div></div></div></div>').join('');
  document.getElementById('exchangeCards').innerHTML=cards||'<div class="panel card small">暂无交易所拆分数据</div>';

  const b=d.backtest||{};
  document.getElementById('backtestSummary').textContent=b.summary||'-';
  document.getElementById('backtestMeta').textContent='样本 '+(b.sample_count||0)+' 个，预测窗口 '+(b.horizon_min||0)+' 分钟，拟合样本 '+(b.fit_event_count||0)+' 个，Weighted SE '+Number(b.fit_weighted_se||0).toFixed(6);
  document.getElementById('rates').innerHTML=[
    ['±20 命中率', fmtPct((Number(b.hit_20_rate||0))*100)],
    ['±50 命中率', fmtPct((Number(b.hit_50_rate||0))*100)],
    ['±100 命中率', fmtPct((Number(b.hit_100_rate||0))*100)],
    ['平均最大偏移', fmtPrice(b.avg_max_move)]
  ].map(it=>'<div class="rate"><div class="k">'+it[0]+'</div><div class="v">'+it[1]+'</div></div>').join('');
}

initTheme();
mountSectionHelp();
load();
setInterval(load,30000);
</script>
