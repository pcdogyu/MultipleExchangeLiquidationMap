<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ЗҝЖҪЗеЛг</title>
<style>body{margin:0;background:#f5f7fb;color:#1f2937;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}.nav{height:56px;background:#0b1220;border-bottom:1px solid #243145;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:10}.nav-left,.nav-right{display:flex;align-items:center;gap:20px}.brand{font-size:18px;font-weight:700;color:#eef3f9}.menu a{color:#d6deea;text-decoration:none;font-size:16px;margin-right:18px}.menu a.active{color:#fff;font-weight:700}.upgrade{color:#fff;font-weight:700;text-decoration:none}.wrap{max-width:1200px;margin:0 auto;padding:22px}.panel{border:1px solid #dce3ec;background:#fff;margin:14px 0;padding:16px;border-radius:10px;box-shadow:0 1px 2px rgba(15,23,42,.04)}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #e5e7eb;padding:8px 10px;text-align:center;font-size:13px}.row{display:flex;gap:8px;align-items:center}.btn{background:#fff;color:#111827;border:1px solid #cbd5e1;padding:8px 12px;border-radius:8px;cursor:pointer}.btn.primary{background:#22c55e;color:#fff;border-color:#22c55e}.small{font-size:12px;color:#64748b}.upgrade-modal{position:fixed;inset:0;background:rgba(2,6,23,.55);display:none;align-items:center;justify-content:center;z-index:9999}.upgrade-modal.show{display:flex}.upgrade-card{width:min(880px,92vw);max-height:82vh;background:#0b1220;color:#e2e8f0;border:1px solid #334155;border-radius:10px;box-shadow:0 10px 30px rgba(2,6,23,.45);overflow:hidden}.upgrade-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #334155}.upgrade-title{font-size:14px;font-weight:700}.upgrade-close{background:transparent;border:1px solid #475569;color:#e2e8f0;border-radius:6px;padding:4px 8px;cursor:pointer}.upgrade-log{margin:0;padding:12px;white-space:pre-wrap;overflow:auto;max-height:62vh;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.45}.upgrade-foot{padding:8px 12px;border-top:1px solid #334155;font-size:12px;color:#94a3b8}.footer{margin:18px auto 0 auto;max-width:1200px;padding:10px 12px;font-size:12px;color:#64748b;text-align:center}</style></head>
<body><div class="nav"><div class="nav-left"><div class="brand">ETH Liquidation Map</div><div class="menu"><a href="/">ЗеЛгИИЗш</a><a href="/config">ДЈРНЕдЦГ</a><a href="/map">ЕМҝЪ»гЧЬ</a><a href="/liquidations" class="active">ЗҝЖҪЗеЛг</a><a href="/bubbles">ЖшЕЭНј</a><a href="/channel">ПыПўНЁөА</a></div></div><div class="nav-right"><a href="#" class="upgrade" onclick="return doUpgrade(event)">Йэј¶</a></div></div>
<div class="wrap"><div class="panel"><div class="row" style="justify-content:space-between"><h2 style="margin:0">ETH ЗҝЖҪЗеЛгЈЁBinance / Bybit / OKXЈ©</h2><div class="row"><button id="filterBtn" class="btn" onclick="toggleFilter()">№эВЛРЎөҘ</button><button class="btn" onclick="prev()">ЙПТ»Ті</button><button class="btn" onclick="next()">ПВТ»Ті</button><button class="btn primary" onclick="load()">ЛўРВ</button></div></div><div id="meta" class="small" style="margin:8px 0 10px 0"></div><div id="table"></div></div></div>
<script>
let page=1,pageSize=25,filterSmall=false;
function fmtPrice(n){return Number(n).toLocaleString('zh-CN',{minimumFractionDigits:1,maximumFractionDigits:1})}
function fmtQty(n){return Number(n).toLocaleString('zh-CN',{maximumFractionDigits:4})}
function fmtAmt(n){n=Number(n);if(!isFinite(n))return '-';return n.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtTime(ts){try{return new Date(Number(ts||0)).toLocaleString('zh-CN',{hour12:false});}catch(_){return '-';}}
function render(rows){if(!rows||!rows.length){document.getElementById('table').innerHTML='<div class="small">ФЭОЮКэҫЭ</div>';return;}let h='<table><thead><tr><th>Кұјд</th><th>Ҫ»ТЧЛщ</th><th>·ҪПт</th><th>јЫёс</th><th>КэБҝ</th><th>Ҫр¶о (USD)</th></tr></thead><tbody>';for(const r of rows){h+='<tr><td>'+fmtTime(r.event_ts)+'</td><td>'+String(r.exchange||'').toUpperCase()+'</td><td>'+r.side+'</td><td>'+fmtPrice(r.price)+'</td><td>'+fmtQty(r.qty)+'</td><td>'+fmtAmt(r.notional_usd)+'</td></tr>';}h+='</tbody></table>';document.getElementById('table').innerHTML=h;}
function toggleFilter(){filterSmall=!filterSmall;const b=document.getElementById('filterBtn');if(b)b.textContent=filterSmall?'ПФКҫИ«Іҝ':'№эВЛРЎөҘ';load();}
async function load(){const r=await fetch('/api/liquidations?page='+page+'&limit='+pageSize);const d=await r.json();let rows=(d.rows||[]);if(filterSmall)rows=rows.filter(x=>Number(x.qty||0)>=1);document.getElementById('meta').textContent='өЪ '+d.page+' Ті | ГҝТі '+d.page_size+' Мх'+(filterSmall?' | ТС№эВЛРЎУЪ 1 ETH өДјЗВј':'');render(rows);}
function prev(){if(page>1){page--;load();}}
function next(){page++;load();}
async function openUpgradeModal(){const m=document.getElementById('upgradeModal'),logEl=document.getElementById('upgradeLog'),foot=document.getElementById('upgradeFoot');if(!m||!logEl||!foot)return;m.classList.add('show');logEl.textContent='';foot.textContent='е§қпҪ…ж№Әз‘ҷп№ҖеҪӮйҚ—еӣ©йӘҮ...';const r=await fetch('/api/upgrade/pull',{method:'POST'});const d=await r.json().catch(()=>({error:'response parse failed',output:''}));if(d.error){logEl.textContent=String(d.output||'');foot.textContent='з‘ҷп№ҖеҪӮжҫ¶иҫ«и§Ұ: '+d.error;return;}foot.textContent='е®ёиҢ¶Р•йҚҷжҲҜзҙқе§қпҪ…ж№ӘйҺөСҶо”‘...';let stable=0;for(let i=0;i<180;i++){await new Promise(res=>setTimeout(res,1000));const pr=await fetch('/api/upgrade/progress').then(x=>x.json()).catch(()=>null);if(!pr)continue;logEl.textContent=String(pr.log||'');logEl.scrollTop=logEl.scrollHeight;if(pr.done){foot.textContent=(String(pr.exit_code||'')==='0')?'йҚ—еӣ©йӘҮзҖ№еұҫеһҡйӘһи·әеҮЎй–Іе¶…жғ?:'йҚ—еӣ©йӘҮзҖ№еұҫеһҡй”ӣеІ„вӮ¬вӮ¬йҚ‘иҷ№зҲң '+String(pr.exit_code||'?');return;}if(!pr.running)stable++;else stable=0;if(stable>=3){foot.textContent='йҚ—еӣ©йӘҮжқ©ж¶ҡв–је®ёиҢ¬зІЁйҸүзҮӮзҙҷйҗҳиҲөвӮ¬дҪ№ж№ӯйҗӯгғҜзҙҡй”ӣеІғоҮ¬еҰ«вӮ¬йҸҢгғҰжЈ©и№?;return;}}foot.textContent='йҚ—еӣ©йӘҮжө е¶…ж№Әжқ©ж¶ңо”‘й”ӣеІғоҮ¬з»Ӣе¶…жӮ—йҚҗе¶Үж№…';}
function closeUpgradeModal(){const m=document.getElementById('upgradeModal');if(m)m.classList.remove('show');}
async function doUpgrade(event){if(event)event.preventDefault();openUpgradeModal();return false;}
setInterval(load,5000);load();(async()=>{try{const r=await fetch('/api/version');const v=await r.json();const el=document.getElementById('globalFooter');if(el)el.textContent='Code by Yuhao@jiansutech.com - '+(v.commit_time||'-')+' - '+(v.commit_id||'-')+' - '+(v.branch||'-');}catch(_){const el=document.getElementById('globalFooter');if(el)el.textContent='Code by Yuhao@jiansutech.com - - - -';}})();
</script><div id="upgradeModal" class="upgrade-modal"><div class="upgrade-card"><div class="upgrade-head"><div class="upgrade-title">йҚ—еӣ©йӘҮжқ©еӣ©в–ј</div><button class="upgrade-close" onclick="closeUpgradeModal()">йҚҸжҠҪжЈ?/button></div><pre id="upgradeLog" class="upgrade-log"></pre><div id="upgradeFoot" class="upgrade-foot">з»ӣеӨҠз·ҹеҜ®вӮ¬жҝ®?..</div></div></div><div id="globalFooter" class="footer">Code by Yuhao@jiansutech.com - loading - loading - loading</div></body></html>
